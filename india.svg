<svg width="360" height="240" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Saffron -->
  <rect width="360" height="80" y="0" fill="#FF9933"/>

  <!-- White -->
  <rect width="360" height="80" y="80" fill="#FFFFFF"/>

  <!-- Green -->
  <rect width="360" height="80" y="160" fill="#138808"/>

  <!-- Ashoka Chakra -->
  <circle cx="180" cy="120" r="30" fill="none" stroke="#000080" stroke-width="2"/>

  <!-- 24 spokes -->
  <g stroke="#000080" stroke-width="1.5">
    <line x1="180" y1="120" x2="180" y2="90"/>
    <line x1="180" y1="120" x2="195" y2="93"/>
    <line x1="180" y1="120" x2="207" y2="105"/>
    <line x1="180" y1="120" x2="210" y2="120"/>
    <line x1="180" y1="120" x2="207" y2="135"/>
    <line x1="180" y1="120" x2="195" y2="147"/>
    <line x1="180" y1="120" x2="180" y2="150"/>
    <line x1="180" y1="120" x2="165" y2="147"/>
    <line x1="180" y1="120" x2="153" y2="135"/>
    <line x1="180" y1="120" x2="150" y2="120"/>
    <line x1="180" y1="120" x2="153" y2="105"/>
    <line x1="180" y1="120" x2="165" y2="93"/>

    <!-- mirrored spokes -->
    <line x1="180" y1="120" x2="191" y2="95"/>
    <line x1="180" y1="120" x2="205" y2="110"/>
    <line x1="180" y1="120" x2="205" y2="130"/>
    <line x1="180" y1="120" x2="191" y2="145"/>
    <line x1="180" y1="120" x2="169" y2="145"/>
    <line x1="180" y1="120" x2="155" y2="130"/>
    <line x1="180" y1="120" x2="155" y2="110"/>
    <line x1="180" y1="120" x2="169" y2="95"/>
  </g>
</svg>
